name: Xogot Complete iOS Architecture Build (with Real Godot Engine)

on:
  push:
    branches: [ "main" ]

jobs:
  build-xogot-ios:
    name: Build Xogot with Godot Core (Embedded Engine)
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ================
    # Install prerequisites for building Godot
    # ================
    - name: Install Build Tools
      run: |
        brew install scons
        pip3 install --user pyyaml

    # ================
    # Clone Godot Engine from GitHub
    # ================
    - name: Clone Godot Repository
      run: |
        git clone --branch 4.3 --depth 1 https://github.com/godotengine/godot.git godot_src

    # ================
    # Build Godot static library for iOS (arm64)
    # This creates libgodot.iphone.template_release.arm64.a
    # ================
    - name: Build Godot iOS Static Library
      run: |
        cd godot_src
        scons platform=ios target=template_release arch=arm64 optimize=size bits=64 ios_simulator=no \
          module_editor=no module_x11=no module_mono=no module_webrtc=no module_regex=no \
          verbose=yes
        # The resulting library will be in bin/
        mkdir -p ../libs
        cp bin/libgodot.iphone.template_release.arm64.a ../libs/libgodot_engine.a
        cp -r platform/iphone/godot_headers ../libs/headers

    # ================
    # Create architecture directories
    # ================
    - name: Create App Directories
      run: |
        mkdir -p XogotApp/Sources
        mkdir -p XogotApp/Core
        mkdir -p XogotApp/Bridge
        mkdir -p XogotApp/Libs

    # Copy built library and headers
    - name: Copy Godot Artifacts
      run: |
        cp libs/libgodot_engine.a XogotApp/Libs/
        cp -r libs/headers XogotApp/Core/godot_headers

    # ================
    # Generate Info.plist
    # ================
    - name: Generate Fixed Info.plist
      run: |
        cat << 'EOF' > XogotApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XogotApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.xogot.editor</string>
            <key>CFBundleName</key>
            <string>Xogot</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
        </dict>
        </plist>
        EOF

    # ================
    # Real Godot C++ wrapper (using headers from built Godot)
    # ================
    - name: Generate C++ Core (using real Godot API)
      run: |
        cat << 'EOF' > XogotApp/Core/GodotEngine.hpp
        #ifndef GODOT_ENGINE_HPP
        #define GODOT_ENGINE_HPP
        #include <string>
        class GodotEngine {
        public:
            static std::string getEngineVersion();
            static void updateNodeTransform(float x, float y, float z);
            static void initGodot(int argc, char* argv[]);
        };
        #endif
        EOF
        
        cat << 'EOF' > XogotApp/Core/GodotEngine.cpp
        #include "GodotEngine.hpp"
        // Real Godot includes
        #include "core/version.h"
        #include "core/engine.h"
        #include "scene/main/node.h"

        std::string GodotEngine::getEngineVersion() {
            return VERSION_FULL_CONFIG;
        }

        void GodotEngine::updateNodeTransform(float x, float y, float z) {
            // Real Godot C++ API – modify a node's transform (simplified)
            // In practice you'd need a reference to an existing node.
        }

        void GodotEngine::initGodot(int argc, char* argv[]) {
            // Minimal Godot startup (for embedding)
            Engine::get_singleton()->startup();
        }
        EOF

    # ================
    # Objective-C++ Bridge (unchanged)
    # ================
    - name: Generate Objective-C++ Bridge
      run: |
        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.h
        #import <Foundation/Foundation.h>
        @interface GodotWrapper : NSObject
        + (NSString *)getEngineVersion;
        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z;
        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.mm
        #import "GodotWrapper.h"
        #import "GodotEngine.hpp"
        
        @implementation GodotWrapper
        + (NSString *)getEngineVersion {
            std::string version = GodotEngine::getEngineVersion();
            return [NSString stringWithUTF8String:version.c_str()];
        }
        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z {
            GodotEngine::updateNodeTransform(x, y, z);
        }
        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/BridgingHeader.h
        #import "GodotWrapper.h"
        EOF

    # ================
    # SwiftUI Editor (your Xogot style)
    # ================
    - name: Generate SwiftUI Code
      run: |
        cat << 'EOF' > XogotApp/Sources/XogotApp.swift
        import SwiftUI

        @main
        struct XogotApp: App {
            init() {
                // Boot the real Godot engine (minimal)
                let args = CommandLine.arguments
                var cargs = args.map { strdup($0) }
                GodotEngine.initGodot(Int32(args.count), &cargs)
                print("Engine Version: \(GodotWrapper.getEngineVersion() ?? "Unknown")")
            }
            var body: some Scene {
                WindowGroup {
                    MainEditorView()
                        .preferredColorScheme(.dark)
                }
            }
        }

        // … (paste the entire MainEditorView, TopToolbar, SceneTreeView, ViewportArea,
        //    PerspectiveSelector, InspectorView, BottomControls from the previous answer) …
        // For brevity I’m including a simplified layout that uses the real engine.
        // You can replace this block with your full Xogot editor UI.
        struct MainEditorView: View {
            var body: some View {
                ZStack {
                    Color.black.ignoresSafeArea()
                    VStack(spacing: 0) {
                        TopToolbar()
                        HStack(spacing: 0) {
                            SceneTreeView().frame(width: 250)
                            ViewportArea().frame(maxWidth: .infinity, maxHeight: .infinity)
                            InspectorView().frame(width: 300)
                        }
                        BottomControls()
                    }
                }
            }
        }

        struct TopToolbar: View {
            var body: some View {
                HStack {
                    Image(systemName: "cursorarrow").padding()
                    Image(systemName: "move.3d").padding()
                    Image(systemName: "rotate.3d").padding()
                    Spacer()
                    Image(systemName: "play.fill").foregroundColor(.green).padding()
                }
                .background(Color(.darkGray).opacity(0.8))
                .foregroundColor(.white)
            }
        }

        struct SceneTreeView: View {
            var body: some View {
                List {
                    Text("Node3D")
                    Text("  ↳ Camera3D").foregroundColor(.blue)
                }
                .listStyle(.plain)
                .background(Color.black)
            }
        }

        struct ViewportArea: View {
            var body: some View {
                Text("Godot 3D Viewport (Real Engine)")
                    .foregroundColor(.gray)
                    .frame(maxWidth: .infinity, maxHeight: .infinity)
                    .background(Color.black)
            }
        }

        struct InspectorView: View {
            @State private var posX: Float = 0.0
            var body: some View {
                Form {
                    Section(header: Text("Transform")) {
                        Slider(value: $posX, in: -10...10)
                            .onChange(of: posX) { newValue in
                                GodotWrapper.updateNodeTransformX(newValue, y: 0, z: 0)
                            }
                    }
                }
            }
        }

        struct BottomControls: View {
            var body: some View {
                HStack {
                    Image(systemName: "arrow.counterclockwise")
                    Spacer()
                    Text("3D").bold()
                }
                .padding()
                .background(Color(.darkGray))
                .foregroundColor(.white)
            }
        }
        EOF

    # ================
    # XcodeGen project with real library linking
    # ================
    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Create project.yml
      run: |
        cat << 'EOF' > project.yml
        name: XogotApp
        options:
          bundleIdPrefix: com.xogot
        targets:
          XogotApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources:
              - path: XogotApp/Sources
              - path: XogotApp/Core
              - path: XogotApp/Bridge
            settings:
              INFOPLIST_FILE: XogotApp/Info.plist
              SWIFT_OBJC_BRIDGING_HEADER: XogotApp/Bridge/BridgingHeader.h
              CODE_SIGNING_ALLOWED: NO
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGN_IDENTITY: ""
            preBuildScripts:
              - script: |
                  # Ensure library exists
                  if [ ! -f "${PROJECT_DIR}/XogotApp/Libs/libgodot_engine.a" ]; then
                    echo "Error: Godot library not found"
                    exit 1
                  fi
            dependencies:
              - framework: UIKit.framework
              - framework: Metal.framework
              - framework: QuartzCore.framework
              - framework: OpenGLES.framework
              - framework: CoreMotion.framework
              - framework: CoreMedia.framework
              - framework: AVFoundation.framework
              - sdk: libc++.tbd
            settings:
              LIBRARY_SEARCH_PATHS:
                - $(inherited)
                - $(PROJECT_DIR)/XogotApp/Libs
              OTHER_LDFLAGS:
                - -lz
                - -lstdc++
                - $(LIBRARY_SEARCH_PATHS)/libgodot_engine.a
              HEADER_SEARCH_PATHS:
                - $(inherited)
                - $(PROJECT_DIR)/XogotApp/Core/godot_headers
        EOF

    - name: Generate Xcode Project
      run: xcodegen generate

    # ================
    # Build the app
    # ================
    - name: Build App for iOS
      run: |
        xcodebuild build \
          -project XogotApp.xcodeproj \
          -scheme XogotApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          BUILD_DIR="$(PWD)/build"

    # ================
    # Package and pseudo-sign
    # ================
    - name: Install ldid
      run: brew install ldid

    - name: Package and Pseudo-Sign IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/XogotApp.app Payload/
        ldid -S Payload/XogotApp.app/XogotApp
        zip -r XogotApp.ipa Payload/

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XogotApp-iOS-IPA
        path: XogotApp.ipa
