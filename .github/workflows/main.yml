name: Xogot Complete iOS Architecture Build (Full Editor)

on:
  push:
    branches: [ "main" ]

jobs:
  build-xogot-ios:
    name: Build Xogot with Full Godot Editor (Unofficial)
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        brew install scons
        pip3 install --user --break-system-packages pyyaml

    # ================
    # Clone patched Godot repository (supports iOS editor)
    # ================
    - name: Clone Godot (iOS Editor Fork)
      run: |
        git clone --branch ios_editor --depth 1 https://github.com/timoschwarzer/godot.git godot_src

    # ================
    # Build Godot editor static library for iOS
    # ================
    - name: Build Godot Editor iOS Static Library
      run: |
        cd godot_src
        scons platform=ios target=editor arch=arm64 optimize=size bits=64 ios_simulator=no \
          module_editor=yes module_mono=no module_webrtc=no module_regex=no \
          progress=no -j$(sysctl -n hw.logicalcpu)
        mkdir -p ../libs
        # Correct output name: libgodot.ios.editor.arm64.a
        cp bin/libgodot.ios.editor.arm64.a ../libs/libgodot_editor.a
        cp -r platform/iphone/godot_headers ../libs/headers
        # Copy editor resources if they exist
        if [ -d "misc/dist/ios_tools/editor_data" ]; then
          cp -r misc/dist/ios_tools/editor_data ../libs/editor_data
        elif [ -d "misc/dist/ios/editor_data" ]; then
          cp -r misc/dist/ios/editor_data ../libs/editor_data
        else
          echo "Warning: editor_data folder not found, skipping."
        fi

    # ================
    # Create app directories
    # ================
    - name: Create App Directories
      run: |
        mkdir -p XogotApp/Sources
        mkdir -p XogotApp/Core
        mkdir -p XogotApp/Bridge
        mkdir -p XogotApp/Libs
        mkdir -p XogotApp/EditorResources

    - name: Copy Godot Artifacts
      run: |
        cp libs/libgodot_editor.a XogotApp/Libs/
        cp -r libs/headers XogotApp/Core/godot_headers
        if [ -d "libs/editor_data" ]; then
          cp -r libs/editor_data XogotApp/EditorResources
        fi

    # ================
    # Generate Info.plist
    # ================
    - name: Generate Fixed Info.plist
      run: |
        cat << 'EOF' > XogotApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XogotApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.xogot.editor</string>
            <key>CFBundleName</key>
            <string>Xogot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
            <key>UIFileSharingEnabled</key>
            <true/>
            <key>LSSupportsOpeningDocumentsInPlace</key>
            <true/>
        </dict>
        </plist>
        EOF

    # ================
    # C++ Core – initializes and runs the full editor
    # ================
    - name: Generate C++ Core (Editor integration)
      run: |
        cat << 'EOF' > XogotApp/Core/GodotEngine.hpp
        #ifndef GODOT_ENGINE_HPP
        #define GODOT_ENGINE_HPP
        #include <string>

        namespace godot {
            class GodotEditor;
        }

        class GodotEngine {
        public:
            static std::string getEngineVersion();
            static void updateNodeTransform(float x, float y, float z);
            static void initEditor(int argc, char* argv[], void* windowHandle);
            static void runEditorLoop();
            static void forwardTouchEvent(int type, float x, float y, int pointerId);
        private:
            static godot::GodotEditor* editorInstance;
        };
        #endif
        EOF
        
        cat << 'EOF' > XogotApp/Core/GodotEngine.cpp
        #include "GodotEngine.hpp"
        #include "core/version.h"
        #include "editor/editor_node.h"
        #include "main/main.h"
        #include "platform/iphone/os_iphone.h"
        
        godot::GodotEditor* GodotEngine::editorInstance = nullptr;

        std::string GodotEngine::getEngineVersion() {
            return VERSION_FULL_CONFIG;
        }

        void GodotEngine::updateNodeTransform(float x, float y, float z) {
            // Editor‑specific node manipulation
        }

        void GodotEngine::initEditor(int argc, char* argv[], void* windowHandle) {
            Error err = Main::setup("iphone", argc, argv, false);
            if (err != OK) {
                ERR_PRINT("Failed to setup main");
                return;
            }
            editorInstance = new EditorNode;
            editorInstance->init();
            Main::start();
        }

        void GodotEngine::runEditorLoop() {
            Main::iteration();
        }

        void GodotEngine::forwardTouchEvent(int type, float x, float y, int pointerId) {
            // Forward to Godot's input system
        }
        EOF

    # ================
    # Objective-C++ Bridge
    # ================
    - name: Generate Objective-C++ Bridge
      run: |
        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.h
        #import <Foundation/Foundation.h>
        #import <UIKit/UIKit.h>

        @interface GodotWrapper : NSObject

        + (NSString *)getEngineVersion;
        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z;
        + (void)startEditorWithArgc:(int)argc argv:(char**)argv layer:(CALayer*)layer;
        + (void)runEditorIteration;
        + (void)forwardTouch:(UITouch*)touch eventType:(NSInteger)type;
        + (UIView*)editorView;

        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.mm
        #import "GodotWrapper.h"
        #import "GodotEngine.hpp"

        static UIView* _editorView = nil;

        @implementation GodotWrapper

        + (NSString *)getEngineVersion {
            return [NSString stringWithUTF8String:GodotEngine::getEngineVersion().c_str()];
        }

        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z {
            GodotEngine::updateNodeTransform(x, y, z);
        }

        + (void)startEditorWithArgc:(int)argc argv:(char**)argv layer:(CALayer*)layer {
            GodotEngine::initEditor(argc, argv, (__bridge void*)layer);
            dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0), ^{
                while (true) {
                    GodotEngine::runEditorLoop();
                    usleep(16000); // ~60 FPS
                }
            });
        }

        + (void)runEditorIteration {
            GodotEngine::runEditorLoop();
        }

        + (void)forwardTouch:(UITouch*)touch eventType:(NSInteger)type {
            CGPoint pt = [touch locationInView:nil];
            GodotEngine::forwardTouchEvent((int)type, pt.x, pt.y, 0);
        }

        + (UIView*)editorView {
            if (!_editorView) {
                _editorView = [[UIView alloc] init];
                _editorView.contentScaleFactor = UIScreen.mainScreen.scale;
            }
            return _editorView;
        }

        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/BridgingHeader.h
        #import "GodotWrapper.h"
        EOF

    # ================
    # SwiftUI Editor Host
    # ================
    - name: Generate SwiftUI Code
      run: |
        cat << 'EOF' > XogotApp/Sources/XogotApp.swift
        import SwiftUI

        @main
        struct XogotApp: App {
            var body: some Scene {
                WindowGroup {
                    GodotEditorContainer()
                        .ignoresSafeArea()
                }
            }
        }

        struct GodotEditorContainer: UIViewRepresentable {
            func makeUIView(context: Context) -> UIView {
                let view = GodotWrapper.editorView()
                GodotWrapper.startEditor(withArgc: CommandLine.arguments.count,
                                          argv: CommandLine.unsafeArgv,
                                          layer: view.layer)
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {}
        }
        EOF

    # ================
    # XcodeGen project
    # ================
    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Create project.yml
      run: |
        cat << 'EOF' > project.yml
        name: XogotApp
        options:
          bundleIdPrefix: com.xogot
        targets:
          XogotApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources:
              - path: XogotApp/Sources
              - path: XogotApp/Core
              - path: XogotApp/Bridge
            settings:
              INFOPLIST_FILE: XogotApp/Info.plist
              SWIFT_OBJC_BRIDGING_HEADER: XogotApp/Bridge/BridgingHeader.h
              CODE_SIGNING_ALLOWED: NO
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGN_IDENTITY: ""
            dependencies:
              - framework: UIKit.framework
              - framework: Metal.framework
              - framework: QuartzCore.framework
              - framework: OpenGLES.framework
              - framework: CoreMotion.framework
              - framework: CoreMedia.framework
              - framework: AVFoundation.framework
              - framework: CoreGraphics.framework
              - framework: CoreText.framework
              - framework: ImageIO.framework
              - framework: GameController.framework
              - sdk: libc++.tbd
              - sdk: libz.tbd
            settings:
              LIBRARY_SEARCH_PATHS:
                - $(inherited)
                - $(PROJECT_DIR)/XogotApp/Libs
              OTHER_LDFLAGS:
                - -ObjC
                - -lstdc++
                - $(LIBRARY_SEARCH_PATHS)/libgodot_editor.a
                - -Wl,-force_load,$(LIBRARY_SEARCH_PATHS)/libgodot_editor.a
              HEADER_SEARCH_PATHS:
                - $(inherited)
                - $(PROJECT_DIR)/XogotApp/Core/godot_headers
              RESOURCES:
                - path: XogotApp/EditorResources
                  type: folder
                  buildPhase: resources
        EOF

    - name: Generate Xcode Project
      run: xcodegen generate

    # ================
    # Build the app
    # ================
    - name: Build App for iOS
      run: |
        xcodebuild build \
          -project XogotApp.xcodeproj \
          -scheme XogotApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          BUILD_DIR="$(PWD)/build"

    # ================
    # Package and pseudo-sign
    # ================
    - name: Install ldid
      run: brew install ldid

    - name: Package and Pseudo-Sign IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/XogotApp.app Payload/
        ldid -S Payload/XogotApp.app/XogotApp
        zip -r XogotApp.ipa Payload/

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Xogot-iOS-Editor-IPA
        path: XogotApp.ipa
