name: Build Xogot-Style iOS Editor with Touch Toolbar

on:
  push:
    branches: [ "main" ]

env:
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  build-ios-editor:
    name: Build Full Godot Editor IPA for iOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # -----------------------------------------------------------------------
    # 1.  Install build tools
    # -----------------------------------------------------------------------
    - name: Install Build Tools
      run: |
        brew install scons xcodegen ldid
        pip3 install --user --break-system-packages pyyaml

    # -----------------------------------------------------------------------
    # 2.  Clone the iOS‑Editor fork of Godot 4.2
    # -----------------------------------------------------------------------
    - name: Clone Godot iOS Editor Fork
      run: |
        git clone --branch 4.2 --depth 1 https://github.com/cgbeutler/Godot-Engine-iOS-Editor.git godot_src

    # -----------------------------------------------------------------------
    # 3.  Build Godot iOS editor library (arm64, release)
    # -----------------------------------------------------------------------
    - name: Build Godot iOS Editor Engine
      run: |
        cd godot_src
        scons platform=ios target=editor arch=arm64 optimize=size bits=64 \
          vulkan=no use_volk=no module_mono_enabled=no \
          progress=no -j$(sysctl -n hw.logicalcpu)
        mkdir -p ../libs
        cp bin/libgodot.ios.editor.arm64.a ../libs/libgodot_editor.a

    # -----------------------------------------------------------------------
    # 4.  Copy required headers
    # -----------------------------------------------------------------------
    - name: Copy generated headers
      run: |
        find godot_src/bin -name "platform_config.h" -exec cp {} godot_src/platform/ios/ \;

    # -----------------------------------------------------------------------
    # 5.  Create app directory structure
    # -----------------------------------------------------------------------
    - name: Create App Directories
      run: |
        mkdir -p XogotEditor/{Sources,Core,Bridge,Libs}

    # -----------------------------------------------------------------------
    # 6.  Copy library and strip main
    # -----------------------------------------------------------------------
    - name: Copy & Clean Library
      run: |
        cp libs/libgodot_editor.a XogotEditor/Libs/
        ar -d XogotEditor/Libs/libgodot_editor.a app.ios.editor.arm64.o || true

    # -----------------------------------------------------------------------
    # 7.  Info.plist (with file sharing enabled)
    # -----------------------------------------------------------------------
    - name: Generate Info.plist
      run: |
        cat << 'EOF' > XogotEditor/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XogotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>com.xogot.editor</string>
            <key>CFBundleName</key>
            <string>Godot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
            <key>UIFileSharingEnabled</key>
            <true/>
            <key>LSSupportsOpeningDocumentsInPlace</key>
            <true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
                <string>metal</string>
            </array>
            <key>UIStatusBarHidden</key>
            <true/>
        </dict>
        </plist>
        EOF

    # -----------------------------------------------------------------------
    # 8.  C++ Core (Godot editor API wrappers)
    # -----------------------------------------------------------------------
    - name: Generate C++ Core
      run: |
        cat << 'EOF' > XogotEditor/Core/GodotEngine.hpp
        #ifndef GODOT_ENGINE_HPP
        #define GODOT_ENGINE_HPP
        #include <string>

        class GodotEngine {
        public:
            static void initEngine(int argc, char* argv[]);
            static void iterateEngine();
            static void createView(void **view);
            static void setView(void *view);
            static void deinitEngine();
            // Editor commands
            static bool isEditorActive();
            static void saveScene();
            static void playScene();
            static void stopScene();
            static void undo();
            static void redo();
        };
        #endif
        EOF

        cat << 'EOF' > XogotEditor/Core/GodotEngine.cpp
        #include "GodotEngine.hpp"
        #include "core/version.h"
        #include "editor/editor_node.h"
        #include "scene/main/window.h"

        extern "C" {
            void godot_ios_init(int argc, char **argv);
            void godot_ios_iterate();
            void godot_ios_view_create(void **view);
            void godot_ios_set_view(void *view);
            void godot_ios_deinit();
        }

        void GodotEngine::initEngine(int argc, char* argv[]) {
            godot_ios_init(argc, argv);
        }
        void GodotEngine::iterateEngine() {
            godot_ios_iterate();
        }
        void GodotEngine::createView(void **view) {
            godot_ios_view_create(view);
        }
        void GodotEngine::setView(void *view) {
            godot_ios_set_view(view);
        }
        void GodotEngine::deinitEngine() {
            godot_ios_deinit();
        }

        bool GodotEngine::isEditorActive() {
            return EditorNode::get_singleton() != nullptr;
        }

        void GodotEngine::saveScene() {
            EditorNode *editor = EditorNode::get_singleton();
            if (editor) editor->save_scene();
        }

        void GodotEngine::playScene() {
            EditorNode *editor = EditorNode::get_singleton();
            if (editor) editor->get_editor_interface()->play_main_scene();
        }

        void GodotEngine::stopScene() {
            EditorNode *editor = EditorNode::get_singleton();
            if (editor) editor->get_editor_interface()->stop_playing_scene();
        }

        void GodotEngine::undo() {
            EditorNode *editor = EditorNode::get_singleton();
            if (editor && editor->get_undo_redo()) {
                editor->get_undo_redo()->undo();
            }
        }

        void GodotEngine::redo() {
            EditorNode *editor = EditorNode::get_singleton();
            if (editor && editor->get_undo_redo()) {
                editor->get_undo_redo()->redo();
            }
        }
        EOF

    # -----------------------------------------------------------------------
    # 9.  Plugin stubs
    # -----------------------------------------------------------------------
    - name: Generate Plugin Stubs
      run: |
        cat << 'EOF' > XogotEditor/Core/plugin_stubs.cpp
        extern "C" {
            void godot_ios_embedded_plugins_initialize() {}
            void godot_ios_embedded_plugins_deinitialize() {}
        }
        EOF

    # -----------------------------------------------------------------------
    # 10. ObjC++ Bridge (expose editor commands to Swift)
    # -----------------------------------------------------------------------
    - name: Generate ObjC++ Bridge
      run: |
        cat << 'EOF' > XogotEditor/Bridge/GodotWrapper.h
        #import <UIKit/UIKit.h>

        @interface GodotWrapper : NSObject

        + (void)startEditorWithArgc:(int)argc argv:(char**)argv;
        + (void)iterateEngine;
        + (void)deinitEngine;
        + (UIView *)createEditorView;
        + (void)setEditorView:(UIView *)view;

        // Editor actions
        + (void)saveScene;
        + (void)playScene;
        + (void)stopScene;
        + (void)undo;
        + (void)redo;

        @end
        EOF

        cat << 'EOF' > XogotEditor/Bridge/GodotWrapper.mm
        #import "GodotWrapper.h"
        #import "GodotEngine.hpp"

        @implementation GodotWrapper

        + (void)startEditorWithArgc:(int)argc argv:(char**)argv {
            GodotEngine::initEngine(argc, argv);
        }
        + (void)iterateEngine {
            GodotEngine::iterateEngine();
        }
        + (void)deinitEngine {
            GodotEngine::deinitEngine();
        }
        + (UIView *)createEditorView {
            void *nativeView = nullptr;
            GodotEngine::createView(&nativeView);
            return (__bridge UIView *)nativeView;
        }
        + (void)setEditorView:(UIView *)view {
            GodotEngine::setView((__bridge void *)view);
        }

        + (void)saveScene {
            GodotEngine::saveScene();
        }
        + (void)playScene {
            GodotEngine::playScene();
        }
        + (void)stopScene {
            GodotEngine::stopScene();
        }
        + (void)undo {
            GodotEngine::undo();
        }
        + (void)redo {
            GodotEngine::redo();
        }

        @end
        EOF

        cat << 'EOF' > XogotEditor/Bridge/BridgingHeader.h
        #import "GodotWrapper.h"
        EOF

    # -----------------------------------------------------------------------
    # 11. SwiftUI App with touch‑friendly toolbar & gestures
    # -----------------------------------------------------------------------
    - name: Generate SwiftUI Editor App
      run: |
        cat << 'EOF' > XogotEditor/Sources/EditorApp.swift
        import SwiftUI

        @main
        struct EditorApp: App {
            @UIApplicationDelegateAdaptor(AppDelegate.self) var appDelegate

            var body: some Scene {
                WindowGroup {
                    ContentView()
                        .ignoresSafeArea()
                        .preferredColorScheme(.dark)
                }
            }
        }

        class AppDelegate: NSObject, UIApplicationDelegate {
            var displayLink: CADisplayLink?
            
            func application(_ application: UIApplication,
                             didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                // Open project manager so user can create/import projects
                let args = ["--project-manager"]
                var cargs = args.map { strdup($0) }
                GodotWrapper.startEditor(withArgc: Int32(args.count), argv: &cargs)
                for ptr in cargs { free(ptr) }
                
                displayLink = CADisplayLink(target: self, selector: #selector(step))
                displayLink?.add(to: .main, forMode: .common)
                return true
            }
            
            @objc func step(displayLink: CADisplayLink) {
                GodotWrapper.iterateEngine()
            }
            
            func applicationWillTerminate(_ application: UIApplication) {
                displayLink?.invalidate()
                GodotWrapper.deinitEngine()
            }
            
            func applicationDidEnterBackground(_ application: UIApplication) {
                displayLink?.isPaused = true
            }
            
            func applicationWillEnterForeground(_ application: UIApplication) {
                displayLink?.isPaused = false
            }
        }

        struct ContentView: View {
            @State private var showToolbar = true
            
            var body: some View {
                ZStack {
                    // Full‑screen Godot editor view
                    EditorView()
                    
                    // Touch‑friendly toolbar overlay
                    if showToolbar {
                        VStack {
                            EditorToolbar()
                                .padding(.top, 44) // avoid notch
                            Spacer()
                        }
                        .transition(.move(edge: .top).combined(with: .opacity))
                    }
                    
                    // Floating toggle button for toolbar
                    VStack {
                        HStack {
                            Spacer()
                            Button(action: { withAnimation { showToolbar.toggle() } }) {
                                Image(systemName: showToolbar ? "chevron.up" : "chevron.down")
                                    .font(.title2)
                                    .padding(8)
                                    .background(.ultraThinMaterial)
                                    .clipShape(Circle())
                            }
                            .padding()
                        }
                        Spacer()
                    }
                }
                // Two‑finger tap to quickly show/hide toolbar
                .gesture(
                    TapGesture(count: 2)
                        .onEnded { withAnimation { showToolbar.toggle() } }
                )
            }
        }

        // UIViewRepresentable for Godot rendering view
        struct EditorView: UIViewRepresentable {
            func makeUIView(context: Context) -> UIView {
                let view = GodotWrapper.createEditorView()!
                GodotWrapper.setEditorView(view)
                return view
            }
            func updateUIView(_ uiView: UIView, context: Context) {}
        }

        // Toolbar with essential editor actions
        struct EditorToolbar: View {
            var body: some View {
                HStack(spacing: 16) {
                    // Save
                    Button(action: { GodotWrapper.saveScene() }) {
                        Image(systemName: "square.and.arrow.down")
                            .font(.title3)
                    }
                    // Undo / Redo
                    Button(action: { GodotWrapper.undo() }) {
                        Image(systemName: "arrow.uturn.backward")
                    }
                    Button(action: { GodotWrapper.redo() }) {
                        Image(systemName: "arrow.uturn.forward")
                    }
                    Divider().frame(height: 24)
                    // Play / Stop
                    Button(action: { GodotWrapper.playScene() }) {
                        Image(systemName: "play.fill")
                            .foregroundColor(.green)
                    }
                    Button(action: { GodotWrapper.stopScene() }) {
                        Image(systemName: "stop.fill")
                            .foregroundColor(.red)
                    }
                    Spacer()
                    // Additional tools can be added here (move, rotate, scale)
                }
                .padding(.horizontal, 16)
                .frame(height: 52)
                .background(.ultraThinMaterial)
                .cornerRadius(14)
                .padding(.horizontal)
                .shadow(radius: 4)
            }
        }
        EOF

    # -----------------------------------------------------------------------
    # 12. XcodeGen project definition
    # -----------------------------------------------------------------------
    - name: Create project.yml
      run: |
        cat << 'EOF' > project.yml
        name: XogotEditor
        options:
          bundleIdPrefix: com.xogot
        targets:
          XogotEditor:
            type: application
            platform: iOS
            deploymentTarget: "16.0"
            sources:
              - path: XogotEditor/Sources
              - path: XogotEditor/Core
              - path: XogotEditor/Bridge
            settings:
              INFOPLIST_FILE: XogotEditor/Info.plist
              SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/XogotEditor/Bridge/BridgingHeader.h
              CLANG_CXX_LANGUAGE_STANDARD: "c++17"
              GCC_PREPROCESSOR_DEFINITIONS:
                - "GODOT_IPHONE=1"
                - "VULKAN_ENABLED=0"
                - "GLES_ENABLED=1"
              LIBRARY_SEARCH_PATHS:
                - $(PROJECT_DIR)/XogotEditor/Libs
              OTHER_LDFLAGS:
                - -ObjC
                - -lstdc++
                - -force_load $(PROJECT_DIR)/XogotEditor/Libs/libgodot_editor.a
              HEADER_SEARCH_PATHS:
                - $(PROJECT_DIR)/godot_src
                - $(PROJECT_DIR)/godot_src/platform/ios
                - $(PROJECT_DIR)/godot_src/drivers/gles3
                - $(PROJECT_DIR)/godot_src/editor
            dependencies:
              - sdk: UIKit.framework
              - sdk: Metal.framework
              - sdk: QuartzCore.framework
              - sdk: OpenGLES.framework
              - sdk: CoreMotion.framework
              - sdk: CoreMedia.framework
              - sdk: AVFoundation.framework
              - sdk: CoreGraphics.framework
              - sdk: CoreText.framework
              - sdk: ImageIO.framework
              - sdk: GameController.framework
              - sdk: libc++.tbd
              - sdk: libz.tbd
        EOF

    - name: Generate Xcode Project
      run: xcodegen generate

    # -----------------------------------------------------------------------
    # 13. Build the app
    # -----------------------------------------------------------------------
    - name: Build App for iOS
      run: |
        xcodebuild build \
          -project XogotEditor.xcodeproj \
          -scheme XogotEditor \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          BUILD_DIR="$(PWD)/build"

    # -----------------------------------------------------------------------
    # 14. Package IPA with ldid (jailbroken devices)
    # -----------------------------------------------------------------------
    - name: Package and Pseudo-Sign IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/XogotEditor.app Payload/
        ldid -S Payload/XogotEditor.app/XogotEditor
        zip -r GodotEditor.ipa Payload/

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Xogot-Editor-Touch-IPA
        path: GodotEditor.ipa
