name: Xogot Complete iOS Architecture Build (Full Editor)

on:
  push:
    branches: [ "main" ]

jobs:
  build-xogot-ios:
    name: Build Xogot with Godot Engine & Custom SwiftUI Editor
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        brew install scons
        pip3 install --user --break-system-packages pyyaml

    # ================
    # Clone Godot (iOS Engine Fork – master branch)
    # ================
    - name: Clone Godot Engine
      run: |
        git clone --branch master --depth 1 https://github.com/timoschwarzer/godot.git godot_src

    # ================
    # Build Godot iOS static library (template_release, no Vulkan)
    # ================
    - name: Build Godot iOS Engine Library
      run: |
        cd godot_src
        scons platform=ios target=template_release arch=arm64 optimize=size bits=64 ios_simulator=no \
          module_editor=no module_mono=no module_webrtc=no module_regex=no vulkan=no \
          progress=no -j$(sysctl -n hw.logicalcpu)
        mkdir -p ../libs
        cp bin/libgodot.ios.template_release.arm64.a ../libs/libgodot_engine.a

    # ================
    # Copy generated headers
    # ================
    - name: Copy generated headers
      run: |
        find godot_src/bin -name "platform_config.h" -exec cp {} godot_src/platform/ios/ \;

    # ================
    # Create app directories & copy artifacts, then remove duplicate main
    # ================
    - name: Create App Directories
      run: |
        mkdir -p XogotApp/Sources
        mkdir -p XogotApp/Core
        mkdir -p XogotApp/Bridge
        mkdir -p XogotApp/Libs

    - name: Copy Godot Artifacts (and delete main object)
      run: |
        cp libs/libgodot_engine.a XogotApp/Libs/
        # Remove the object that contains Godot's main function to avoid conflict with SwiftUI @main
        ar -d XogotApp/Libs/libgodot_engine.a app.ios.template_release.arm64.o

    # ================
    # Info.plist
    # ================
    - name: Generate Info.plist
      run: |
        cat << 'EOF' > XogotApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XogotApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.xogot.editor</string>
            <key>CFBundleName</key>
            <string>Xogot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
            <key>UIFileSharingEnabled</key>
            <true/>
            <key>LSSupportsOpeningDocumentsInPlace</key>
            <true/>
        </dict>
        </plist>
        EOF

    # ================
    # C++ Core (engine startup)
    # ================
    - name: Generate C++ Core
      run: |
        cat << 'EOF' > XogotApp/Core/GodotEngine.hpp
        #ifndef GODOT_ENGINE_HPP
        #define GODOT_ENGINE_HPP
        #include <string>

        class GodotEngine {
        public:
            static std::string getEngineVersion();
            static void initEngine(int argc, char* argv[]);
            static void startMainLoop();
            static void iterateMainLoop();
            static void updateNodeTransform(float x, float y, float z);
        };
        #endif
        EOF
        
        cat << 'EOF' > XogotApp/Core/GodotEngine.cpp
        #include "GodotEngine.hpp"
        #include "core/version.h"
        #include "main/main.h"
        #include "core/config/engine.h"

        std::string GodotEngine::getEngineVersion() {
            return VERSION_FULL_CONFIG;
        }

        void GodotEngine::initEngine(int argc, char* argv[]) {
            Main::setup("iphone", argc, argv, false);
        }

        void GodotEngine::startMainLoop() {
            Main::start();
        }

        void GodotEngine::iterateMainLoop() {
            Main::iteration();
        }

        void GodotEngine::updateNodeTransform(float x, float y, float z) {
            // Placeholder
        }
        EOF

    # ================
    # Embedded plugin stubs (C++ linkage)
    # ================
    - name: Generate Embedded Plugin Stubs
      run: |
        cat << 'EOF' > XogotApp/Core/plugin_stubs.cpp
        void godot_apple_embedded_plugins_initialize() {}
        void godot_apple_embedded_plugins_deinitialize() {}
        EOF

    # ================
    # ObjC++ Bridge
    # ================
    - name: Generate ObjC++ Bridge
      run: |
        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.h
        #import <Foundation/Foundation.h>
        #import <UIKit/UIKit.h>

        @interface GodotWrapper : NSObject

        + (NSString *)getEngineVersion;
        + (void)startEngineWithArgc:(int)argc argv:(char**)argv;
        + (void)iterateEngine;
        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z;
        + (UIView*)createEngineView;

        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.mm
        #import "GodotWrapper.h"
        #import "GodotEngine.hpp"

        @implementation GodotWrapper

        + (NSString *)getEngineVersion {
            return [NSString stringWithUTF8String:GodotEngine::getEngineVersion().c_str()];
        }

        + (void)startEngineWithArgc:(int)argc argv:(char**)argv {
            GodotEngine::initEngine(argc, argv);
            GodotEngine::startMainLoop();
        }

        + (void)iterateEngine {
            GodotEngine::iterateMainLoop();
        }

        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z {
            GodotEngine::updateNodeTransform(x, y, z);
        }

        + (UIView*)createEngineView {
            UIView *view = [[UIView alloc] init];
            view.contentScaleFactor = UIScreen.mainScreen.scale;
            return view;
        }

        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/BridgingHeader.h
        #import "GodotWrapper.h"
        EOF

    # ================
    # SwiftUI Xogot‑style editor
    # ================
    - name: Generate SwiftUI Editor
      run: |
        cat << 'EOF' > XogotApp/Sources/XogotApp.swift
        import SwiftUI

        @main
        struct XogotApp: App {
            init() {
                let args = CommandLine.arguments
                var cargs = args.map { strdup($0) }
                GodotWrapper.startEngine(withArgc: Int32(args.count), argv: &cargs)
                Timer.scheduledTimer(withTimeInterval: 1.0/60.0, repeats: true) { _ in
                    GodotWrapper.iterateEngine()
                }
            }
            var body: some Scene {
                WindowGroup {
                    XogotMainEditor()
                        .preferredColorScheme(.dark)
                }
            }
        }

        struct XogotMainEditor: View {
            var body: some View {
                VStack(spacing: 0) {
                    TopToolbar()
                    Divider().background(Color.white.opacity(0.1))
                    
                    HStack(spacing: 0) {
                        SceneTreePanel().frame(width: 250)
                        Divider().background(Color.white.opacity(0.1))
                        GodotViewport().frame(maxWidth: .infinity, maxHeight: .infinity)
                        Divider().background(Color.white.opacity(0.1))
                        InspectorPanel().frame(width: 300)
                    }
                    
                    Divider().background(Color.white.opacity(0.1))
                    BottomControls()
                }
                .background(Color(red: 0.1, green: 0.1, blue: 0.1))
            }
        }

        struct TopToolbar: View {
            var body: some View {
                HStack(spacing: 16) {
                    Image(systemName: "cursorarrow")
                    Image(systemName: "move.3d")
                    Image(systemName: "rotate.3d")
                    Image(systemName: "scale.3d")
                    Divider().frame(height: 24)
                    Image(systemName: "square.on.square")
                    
                    Spacer()
                    
                    Button(action: {}) {
                        Image(systemName: "play.fill").foregroundColor(.green).font(.title3)
                    }
                    Button(action: {}) {
                        Image(systemName: "stop.fill").foregroundColor(.red).font(.title3)
                    }
                }
                .padding(.horizontal, 12)
                .frame(height: 48)
                .background(Color(red: 0.15, green: 0.15, blue: 0.15))
                .foregroundColor(.white)
            }
        }

        struct SceneTreePanel: View {
            var body: some View {
                VStack(alignment: .leading, spacing: 0) {
                    Text("Scene").font(.caption).foregroundColor(.gray)
                        .padding(.horizontal, 12).padding(.top, 8)
                    List {
                        Text("Node3D").font(.callout)
                        Text("  ↳ Camera3D").foregroundColor(.blue)
                        Text("  ↳ DirectionalLight3D").foregroundColor(.yellow)
                        Text("  ↳ CharacterBody3D").foregroundColor(.orange)
                    }
                    .listStyle(.plain)
                    .background(Color(red: 0.12, green: 0.12, blue: 0.12))
                    .foregroundColor(.white)
                }
                .background(Color(red: 0.12, green: 0.12, blue: 0.12))
            }
        }

        struct GodotViewport: UIViewRepresentable {
            func makeUIView(context: Context) -> UIView {
                return GodotWrapper.createEngineView()!
            }
            func updateUIView(_ uiView: UIView, context: Context) {}
        }

        struct InspectorPanel: View {
            @State private var posX: Float = 0.0
            @State private var posY: Float = 0.0
            @State private var posZ: Float = 0.0
            
            var body: some View {
                ScrollView {
                    VStack(alignment: .leading, spacing: 16) {
                        Text("Inspector").font(.headline).padding(.top, 8).padding(.horizontal)
                        
                        GroupBox(label: Text("Transform").font(.subheadline)) {
                            VStack(spacing: 12) {
                                PropertySlider(label: "Position X", value: $posX, range: -10...10) {
                                    GodotWrapper.updateNodeTransformX(posX, y: posY, z: posZ)
                                }
                                PropertySlider(label: "Position Y", value: $posY, range: -10...10) {
                                    GodotWrapper.updateNodeTransformX(posX, y: posY, z: posZ)
                                }
                                PropertySlider(label: "Position Z", value: $posZ, range: -10...10) {
                                    GodotWrapper.updateNodeTransformX(posX, y: posY, z: posZ)
                                }
                            }
                            .padding(.vertical, 8)
                        }
                        .padding(.horizontal)
                    }
                }
                .background(Color(red: 0.13, green: 0.13, blue: 0.13))
                .foregroundColor(.white)
            }
        }

        struct PropertySlider: View {
            let label: String
            @Binding var value: Float
            let range: ClosedRange<Float>
            var onChange: (() -> Void)? = nil
            
            var body: some View {
                VStack(alignment: .leading, spacing: 4) {
                    HStack {
                        Text(label).font(.caption).foregroundColor(.gray)
                        Spacer()
                        Text("\(value, specifier: "%.1f")").foregroundColor(.white).font(.caption)
                    }
                    Slider(value: $value, in: range)
                        .onChange(of: value) { _ in onChange?() }
                        .tint(.blue)
                }
            }
        }

        struct BottomControls: View {
            @State private var mode3D = true
            
            var body: some View {
                HStack {
                    Button(action: {}) {
                        Image(systemName: "arrow.counterclockwise")
                    }
                    Spacer()
                    HStack(spacing: 0) {
                        Text("3D")
                            .fontWeight(mode3D ? .bold : .regular)
                            .padding(.horizontal, 12).padding(.vertical, 4)
                            .background(mode3D ? Color.blue : Color.clear)
                            .cornerRadius(4)
                            .onTapGesture { mode3D = true }
                        Text("2D")
                            .fontWeight(!mode3D ? .bold : .regular)
                            .padding(.horizontal, 12).padding(.vertical, 4)
                            .background(!mode3D ? Color.blue : Color.clear)
                            .cornerRadius(4)
                            .onTapGesture { mode3D = false }
                    }
                }
                .padding(.horizontal)
                .frame(height: 40)
                .background(Color(red: 0.15, green: 0.15, blue: 0.15))
                .foregroundColor(.white)
            }
        }
        EOF

    # ================
    # XcodeGen project
    # ================
    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Create project.yml
      run: |
        cat << 'EOF' > project.yml
        name: XogotApp
        options:
          bundleIdPrefix: com.xogot
        targets:
          XogotApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources:
              - path: XogotApp/Sources
              - path: XogotApp/Core
              - path: XogotApp/Bridge
            settings:
              INFOPLIST_FILE: XogotApp/Info.plist
              SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/XogotApp/Bridge/BridgingHeader.h
              CODE_SIGNING_ALLOWED: NO
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGN_IDENTITY: ""
              CLANG_CXX_LANGUAGE_STANDARD: "c++17"
              LIBRARY_SEARCH_PATHS:
                - $(inherited)
                - $(PROJECT_DIR)/XogotApp/Libs
              OTHER_LDFLAGS:
                - -ObjC
                - -lstdc++
                - $(PROJECT_DIR)/XogotApp/Libs/libgodot_engine.a
                - -Wl,-force_load,$(PROJECT_DIR)/XogotApp/Libs/libgodot_engine.a
              HEADER_SEARCH_PATHS:
                - $(inherited)
                - $(PROJECT_DIR)/godot_src
                - $(PROJECT_DIR)/godot_src/platform/ios
            dependencies:
              - framework: UIKit.framework
              - framework: Metal.framework
              - framework: QuartzCore.framework
              - framework: OpenGLES.framework
              - framework: CoreMotion.framework
              - framework: CoreMedia.framework
              - framework: AVFoundation.framework
              - framework: CoreGraphics.framework
              - framework: CoreText.framework
              - framework: ImageIO.framework
              - framework: GameController.framework
              - sdk: libc++.tbd
              - sdk: libz.tbd
        EOF

    - name: Generate Xcode Project
      run: xcodegen generate

    # ================
    # Build, pseudo‑sign, package
    # ================
    - name: Build App for iOS
      run: |
        xcodebuild build \
          -project XogotApp.xcodeproj \
          -scheme XogotApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          BUILD_DIR="$(PWD)/build"

    - name: Install ldid
      run: brew install ldid

    - name: Package and Pseudo-Sign IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/XogotApp.app Payload/
        ldid -S Payload/XogotApp.app/XogotApp
        zip -r XogotApp.ipa Payload/

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Xogot-iOS-Editor-IPA
        path: XogotApp.ipa
