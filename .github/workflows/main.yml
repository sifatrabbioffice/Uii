name: Xogot Complete iOS Architecture Build

on:
  push:
    branches: [ "main" ]

jobs:
  build-xogot-ios:
    name: Build Xogot with Godot Core (Fix null descriptor)
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Architecture Directories
      run: |
        mkdir -p XogotApp/Sources
        mkdir -p XogotApp/Core
        mkdir -p XogotApp/Bridge

    # ==========================================
    # 1. FIXED INFO.PLIST (The cause of the crash)
    # ==========================================
    - name: Generate Fixed Info.plist
      run: |
        cat << 'EOF' > XogotApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XogotApp</string> <key>CFBundleIdentifier</key>
            <string>com.xogot.editor</string>
            <key>CFBundleName</key>
            <string>Xogot</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
        </dict>
        </plist>
        EOF

    # ==========================================
    # 2. GODOT C++ CORE ARCHITECTURE
    # ==========================================
    - name: Generate Godot C++ Core
      run: |
        cat << 'EOF' > XogotApp/Core/GodotEngine.hpp
        #ifndef GODOT_ENGINE_HPP
        #define GODOT_ENGINE_HPP
        #include <string>
        class GodotEngine {
        public:
            static std::string getEngineVersion();
            static void updateNodeTransform(float x, float y, float z);
        };
        #endif
        EOF
        
        cat << 'EOF' > XogotApp/Core/GodotEngine.cpp
        #include "GodotEngine.hpp"
        std::string GodotEngine::getEngineVersion() {
            return "Godot Core 4.x (Xogot Build)";
        }
        void GodotEngine::updateNodeTransform(float x, float y, float z) {
            // Godot C++ Engine Logic will execute here
        }
        EOF

    # ==========================================
    # 3. OBJECTIVE-C++ BRIDGE (Crucial for Swift <-> C++)
    # ==========================================
    - name: Generate Objective-C++ Bridge
      run: |
        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.h
        #import <Foundation/Foundation.h>
        @interface GodotWrapper : NSObject
        + (NSString *)getEngineVersion;
        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z;
        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.mm
        #import "GodotWrapper.h"
        #import "GodotEngine.hpp"
        
        @implementation GodotWrapper
        + (NSString *)getEngineVersion {
            std::string version = GodotEngine::getEngineVersion();
            return [NSString stringWithUTF8String:version.c_str()];
        }
        + (void)updateNodeTransformX:(float)x y:(float)y z:(float)z {
            GodotEngine::updateNodeTransform(x, y, z);
        }
        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/BridgingHeader.h
        #import "GodotWrapper.h"
        EOF

    # ==========================================
    # 4. SWIFTUI INTERFACE (Using Bridge)
    # ==========================================
    - name: Generate SwiftUI Code
      run: |
        cat << 'EOF' > XogotApp/Sources/XogotApp.swift
        import SwiftUI

        @main
        struct XogotApp: App {
            init() {
                // Test C++ Engine Bridge on Startup
                print("Engine Initialized: \(GodotWrapper.getEngineVersion() ?? "Unknown")")
            }
            var body: some Scene {
                WindowGroup {
                    MainEditorView()
                }
            }
        }

        struct MainEditorView: View {
            var body: some View {
                VStack(spacing: 0) {
                    TopToolbarView()
                    Divider()
                    ScrollView(.horizontal, showsIndicators: false) {
                        HStack(spacing: 0) {
                            SceneTreeView().frame(width: 250)
                            Divider()
                            WorkspaceView().frame(width: 500)
                            Divider()
                            InspectorView().frame(width: 300)
                        }
                    }
                }
                .background(Color(UIColor.systemBackground))
            }
        }

        struct TopToolbarView: View {
            var body: some View {
                HStack {
                    Button("2D") {}
                    Button("3D") {}
                    Spacer()
                    Button(action: {}) { Image(systemName: "play.fill") }
                    Spacer()
                }.padding().frame(height: 50)
            }
        }

        struct SceneTreeView: View {
            var body: some View {
                List {
                    Text("Node3D")
                    Text("  ↳ CharacterBody3D").foregroundColor(.blue)
                }
            }
        }

        struct WorkspaceView: View {
            var body: some View {
                Text("Godot 3D Viewport (Rendered via C++)")
                    .foregroundColor(.gray)
                    .frame(maxWidth: .infinity, maxHeight: .infinity)
                    .background(Color.black)
            }
        }

        struct InspectorView: View {
            @State private var posX: Float = 0.0
            var body: some View {
                Form {
                    Section(header: Text("Transform")) {
                        HStack {
                            Text("Position X:")
                            Slider(value: $posX, in: -10...10)
                                .onChange(of: posX) { newValue in
                                    // Send UI change to Godot C++ Core
                                    GodotWrapper.updateNodeTransformX(newValue, y: 0, z: 0)
                                }
                        }
                    }
                }
            }
        }
        EOF

    # ==========================================
    # 5. XCODEGEN CONFIGURATION
    # ==========================================
    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Create project.yml
      run: |
        cat << 'EOF' > project.yml
        name: XogotApp
        options:
          bundleIdPrefix: com.xogot
        targets:
          XogotApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources:
              - path: XogotApp/Sources
              - path: XogotApp/Core
              - path: XogotApp/Bridge
            settings:
              INFOPLIST_FILE: XogotApp/Info.plist
              SWIFT_OBJC_BRIDGING_HEADER: XogotApp/Bridge/BridgingHeader.h
              CODE_SIGNING_ALLOWED: NO
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGN_IDENTITY: ""
        EOF

    - name: Generate Xcode Project
      run: xcodegen generate

    # ==========================================
    # 6. BUILD APP PAYLOAD
    # ==========================================
    - name: Build App for iOS
      run: |
        xcodebuild build \
          -project XogotApp.xcodeproj \
          -scheme XogotApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          BUILD_DIR="$(PWD)/build"

    # ==========================================
    # 7. PSEUDO-SIGNING (Fixes crash on Sideload)
    # ==========================================
    - name: Install ldid for Pseudo-Signing
      run: brew install ldid

    - name: Package and Pseudo-Sign Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/XogotApp.app Payload/
        # Pseudo-sign the binary so tools like TrollStore can run it without "Killed: 9" or bad descriptors
        ldid -S Payload/XogotApp.app/XogotApp
        zip -r XogotApp.ipa Payload/

    # ==========================================
    # 8. UPLOAD ARTIFACT
    # ==========================================
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XogotApp-iOS-IPA
        path: XogotApp.ipa
