name: Xogot Complete iOS Architecture Build (Stable)

on:
  push:
    branches: [ "main" ]

env:
  # Silence Homebrew tap‑trust warnings (aws/tap leftover)
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
  # Godot version to build
  GODOT_VERSION: "4.2.2-stable"

jobs:
  build-xogot-ios:
    name: Build Xogot Editor for iOS (Godot 4.2.2)
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # -----------------------------------------------------------------------
    # 1.  Install build tools
    # -----------------------------------------------------------------------
    - name: Install Build Tools
      run: |
        brew install scons xcodegen ldid
        pip3 install --user --break-system-packages pyyaml

    # -----------------------------------------------------------------------
    # 2.  Clone Godot engine (official release tag)
    # -----------------------------------------------------------------------
    - name: Clone Godot Engine
      run: |
        git clone --branch $GODOT_VERSION --depth 1 https://github.com/godotengine/godot.git godot_src

    # -----------------------------------------------------------------------
    # 3.  Build Godot iOS static library (arm64, release, no editor modules)
    # -----------------------------------------------------------------------
    - name: Build Godot iOS Engine Library
      run: |
        cd godot_src
        scons platform=ios target=template_release arch=arm64 optimize=size bits=64 \
          vulkan=no use_volk=no module_mono_enabled=no module_editor=no \
          module_bmp_enabled=no module_csg_enabled=no module_gridmap_enabled=no \
          module_webp_enabled=no module_theora_enabled=no module_jpg_enabled=no \
          progress=no -j$(sysctl -n hw.logicalcpu)
        mkdir -p ../libs
        cp bin/libgodot.ios.template_release.arm64.a ../libs/libgodot_engine.a

    # -----------------------------------------------------------------------
    # 4.  Copy required headers (platform_config.h)
    # -----------------------------------------------------------------------
    - name: Copy generated headers
      run: |
        find godot_src/bin -name "platform_config.h" -exec cp {} godot_src/platform/ios/ \;

    # -----------------------------------------------------------------------
    # 5.  Create app directory structure
    # -----------------------------------------------------------------------
    - name: Create App Directories
      run: |
        mkdir -p XogotApp/{Sources,Core,Bridge,Libs,Resources}

    # -----------------------------------------------------------------------
    # 6.  Copy Godot static library and remove conflicting main
    # -----------------------------------------------------------------------
    - name: Copy & Clean Library
      run: |
        cp libs/libgodot_engine.a XogotApp/Libs/
        # Remove Godot's own main entry point to avoid clash with SwiftUI's @main
        ar -d XogotApp/Libs/libgodot_engine.a app.ios.template_release.arm64.o

    # -----------------------------------------------------------------------
    # 7.  Generate Info.plist
    # -----------------------------------------------------------------------
    - name: Generate Info.plist
      run: |
        cat << 'EOF' > XogotApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XogotApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.xogot.editor</string>
            <key>CFBundleName</key>
            <string>Xogot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
            <key>UIFileSharingEnabled</key>
            <true/>
            <key>LSSupportsOpeningDocumentsInPlace</key>
            <true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
                <string>metal</string>
            </array>
            <key>UIStatusBarHidden</key>
            <false/>
            <key>UIViewControllerBasedStatusBarAppearance</key>
            <false/>
        </dict>
        </plist>
        EOF

    # -----------------------------------------------------------------------
    # 8.  C++ engine wrapper (thin layer over Godot’s iOS entry points)
    # -----------------------------------------------------------------------
    - name: Generate C++ Core
      run: |
        cat << 'EOF' > XogotApp/Core/GodotEngine.hpp
        #ifndef GODOT_ENGINE_HPP
        #define GODOT_ENGINE_HPP

        #ifdef __cplusplus
        extern "C" {
        #endif

        void godot_ios_init(int argc, char **argv);
        void godot_ios_iterate();
        void godot_ios_view_create(void **view);
        void godot_ios_view_destroy(void *view);
        void godot_ios_set_view(void *view);
        void godot_ios_deinit();

        #ifdef __cplusplus
        }
        #endif
        #endif
        EOF

        cat << 'EOF' > XogotApp/Core/GodotEngine.cpp
        #include "GodotEngine.hpp"
        #include "core/version.h"
        #include "main/main.h"
        #include "core/config/engine.h"
        #include "core/os/os.h"

        // These must match the symbols exported by Godot’s iOS platform.
        // They are defined in platform/iphone/godot_iphone.mm
        extern "C" {
            void godot_ios_init(int argc, char **argv);
            void godot_ios_iterate();
            void godot_ios_view_create(void **view);
            void godot_ios_view_destroy(void *view);
            void godot_ios_set_view(void *view);
            void godot_ios_deinit();
        }

        // Convenience C++ wrappers (used from ObjC bridge)
        std::string GodotEngine::getEngineVersion() {
            return VERSION_FULL_CONFIG;
        }

        void GodotEngine::initEngine(int argc, char* argv[]) {
            // Pass arguments to Godot (--path, --editor, etc.)
            godot_ios_init(argc, argv);
        }

        void GodotEngine::iterateEngine() {
            godot_ios_iterate();
        }

        void GodotEngine::createView(void **view) {
            godot_ios_view_create(view);
        }

        void GodotEngine::destroyView(void *view) {
            godot_ios_view_destroy(view);
        }

        void GodotEngine::setView(void *view) {
            godot_ios_set_view(view);
        }

        void GodotEngine::deinitEngine() {
            godot_ios_deinit();
        }
        EOF

    # -----------------------------------------------------------------------
    # 9.  Stub for embedded plugins (required by Godot)
    # -----------------------------------------------------------------------
    - name: Generate Embedded Plugin Stubs
      run: |
        cat << 'EOF' > XogotApp/Core/plugin_stubs.cpp
        extern "C" {
            void godot_ios_embedded_plugins_initialize() {}
            void godot_ios_embedded_plugins_deinitialize() {}
        }
        EOF

    # -----------------------------------------------------------------------
    # 10. ObjC++ bridge + UIView that hosts Godot’s Metal layer
    # -----------------------------------------------------------------------
    - name: Generate ObjC++ Bridge
      run: |
        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.h
        #import <Foundation/Foundation.h>
        #import <UIKit/UIKit.h>

        @interface GodotWrapper : NSObject

        + (NSString *)getEngineVersion;
        + (void)startEngineWithArgc:(int)argc argv:(char**)argv;
        + (void)iterateEngine;
        + (void)deinitEngine;
        + (UIView *)createEngineView;          // returns a UIView that renders Godot
        + (void)setEngineView:(UIView *)view;  // attach the view to Godot's renderer

        @end
        EOF

        cat << 'EOF' > XogotApp/Bridge/GodotWrapper.mm
        #import "GodotWrapper.h"
        #import "GodotEngine.hpp"

        @implementation GodotWrapper

        + (NSString *)getEngineVersion {
            return [NSString stringWithUTF8String:GodotEngine::getEngineVersion().c_str()];
        }

        + (void)startEngineWithArgc:(int)argc argv:(char**)argv {
            GodotEngine::initEngine(argc, argv);
        }

        + (void)iterateEngine {
            GodotEngine::iterateEngine();
        }

        + (void)deinitEngine {
            GodotEngine::deinitEngine();
        }

        + (UIView *)createEngineView {
            void *nativeView = nullptr;
            GodotEngine::createView(&nativeView);
            // nativeView is a UIView* (actually a GodotView, which is a UIView subclass)
            return (__bridge UIView *)nativeView;
        }

        + (void)setEngineView:(UIView *)view {
            GodotEngine::setView((__bridge void *)view);
        }

        @end
        EOF

        # Bridging header to expose ObjC to Swift
        cat << 'EOF' > XogotApp/Bridge/BridgingHeader.h
        #import "GodotWrapper.h"
        EOF

    # -----------------------------------------------------------------------
    # 11. SwiftUI editor – full Xogot interface with Godot viewport
    # -----------------------------------------------------------------------
    - name: Generate SwiftUI Editor
      run: |
        cat << 'EOF' > XogotApp/Sources/XogotApp.swift
        import SwiftUI

        @main
        struct XogotApp: App {
            @UIApplicationDelegateAdaptor(AppDelegate.self) var appDelegate

            var body: some Scene {
                WindowGroup {
                    XogotMainEditor()
                        .preferredColorScheme(.dark)
                }
            }
        }

        // The AppDelegate starts the engine and runs the main loop via CADisplayLink
        class AppDelegate: NSObject, UIApplicationDelegate {
            var displayLink: CADisplayLink?
            
            func application(_ application: UIApplication,
                             didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                // Path to the bundled Godot project
                guard let resourcePath = Bundle.main.resourcePath else {
                    fatalError("No resource path")
                }
                let projectPath = resourcePath + "/godot_project"
                
                // Build arguments: --path <project> --editor (or omit --editor for game mode)
                let args = ["--path", projectPath]
                var cargs = args.map { strdup($0) }
                GodotWrapper.startEngine(withArgc: Int32(args.count), argv: &cargs)
                
                // Free the duplicated strings
                for ptr in cargs { free(ptr) }
                
                // Start the rendering loop using a display link (60 fps)
                displayLink = CADisplayLink(target: self, selector: #selector(step))
                displayLink?.add(to: .main, forMode: .common)
                
                return true
            }
            
            @objc func step(displayLink: CADisplayLink) {
                GodotWrapper.iterateEngine()
            }
            
            func applicationWillTerminate(_ application: UIApplication) {
                displayLink?.invalidate()
                GodotWrapper.deinitEngine()
            }
            
            func applicationDidEnterBackground(_ application: UIApplication) {
                displayLink?.isPaused = true
            }
            
            func applicationWillEnterForeground(_ application: UIApplication) {
                displayLink?.isPaused = false
            }
        }

        // -----------------------------------------------------------------------
        // Main editor layout (toolbar, scene tree, viewport, inspector)
        // -----------------------------------------------------------------------
        struct XogotMainEditor: View {
            var body: some View {
                VStack(spacing: 0) {
                    TopToolbar()
                    Divider().background(Color.white.opacity(0.1))
                    
                    HStack(spacing: 0) {
                        SceneTreePanel().frame(width: 250)
                        Divider().background(Color.white.opacity(0.1))
                        GodotViewport().frame(maxWidth: .infinity, maxHeight: .infinity)
                        Divider().background(Color.white.opacity(0.1))
                        InspectorPanel().frame(width: 300)
                    }
                    
                    Divider().background(Color.white.opacity(0.1))
                    BottomControls()
                }
                .background(Color(red: 0.1, green: 0.1, blue: 0.1))
            }
        }

        struct TopToolbar: View {
            var body: some View {
                HStack(spacing: 16) {
                    Image(systemName: "cursorarrow")
                    Image(systemName: "move.3d")
                    Image(systemName: "rotate.3d")
                    Image(systemName: "scale.3d")
                    Divider().frame(height: 24)
                    Image(systemName: "square.on.square")
                    
                    Spacer()
                    
                    Button(action: {}) {
                        Image(systemName: "play.fill").foregroundColor(.green).font(.title3)
                    }
                    Button(action: {}) {
                        Image(systemName: "stop.fill").foregroundColor(.red).font(.title3)
                    }
                }
                .padding(.horizontal, 12)
                .frame(height: 48)
                .background(Color(red: 0.15, green: 0.15, blue: 0.15))
                .foregroundColor(.white)
            }
        }

        struct SceneTreePanel: View {
            var body: some View {
                VStack(alignment: .leading, spacing: 0) {
                    Text("Scene").font(.caption).foregroundColor(.gray)
                        .padding(.horizontal, 12).padding(.top, 8)
                    List {
                        Text("Node3D").font(.callout)
                        Text("  ↳ Camera3D").foregroundColor(.blue)
                        Text("  ↳ DirectionalLight3D").foregroundColor(.yellow)
                        Text("  ↳ MeshInstance3D").foregroundColor(.orange)
                    }
                    .listStyle(.plain)
                    .background(Color(red: 0.12, green: 0.12, blue: 0.12))
                    .foregroundColor(.white)
                }
                .background(Color(red: 0.12, green: 0.12, blue: 0.12))
            }
        }

        // UIViewRepresentable wrapping Godot's rendering view
        struct GodotViewport: UIViewRepresentable {
            func makeUIView(context: Context) -> UIView {
                let view = GodotWrapper.createEngineView()!
                GodotWrapper.setEngineView(view)
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {}
        }

        struct InspectorPanel: View {
            @State private var posX: Float = 0.0
            @State private var posY: Float = 0.0
            @State private var posZ: Float = 0.0
            
            var body: some View {
                ScrollView {
                    VStack(alignment: .leading, spacing: 16) {
                        Text("Inspector").font(.headline).padding(.top, 8).padding(.horizontal)
                        
                        GroupBox(label: Text("Transform").font(.subheadline)) {
                            VStack(spacing: 12) {
                                PropertySlider(label: "Position X", value: $posX, range: -10...10)
                                PropertySlider(label: "Position Y", value: $posY, range: -10...10)
                                PropertySlider(label: "Position Z", value: $posZ, range: -10...10)
                            }
                            .padding(.vertical, 8)
                        }
                        .padding(.horizontal)
                    }
                }
                .background(Color(red: 0.13, green: 0.13, blue: 0.13))
                .foregroundColor(.white)
            }
        }

        struct PropertySlider: View {
            let label: String
            @Binding var value: Float
            let range: ClosedRange<Float>
            
            var body: some View {
                VStack(alignment: .leading, spacing: 4) {
                    HStack {
                        Text(label).font(.caption).foregroundColor(.gray)
                        Spacer()
                        Text("\(value, specifier: "%.1f")").foregroundColor(.white).font(.caption)
                    }
                    Slider(value: $value, in: range).tint(.blue)
                }
            }
        }

        struct BottomControls: View {
            @State private var mode3D = true
            
            var body: some View {
                HStack {
                    Button(action: {}) {
                        Image(systemName: "arrow.counterclockwise")
                    }
                    Spacer()
                    HStack(spacing: 0) {
                        Text("3D")
                            .fontWeight(mode3D ? .bold : .regular)
                            .padding(.horizontal, 12).padding(.vertical, 4)
                            .background(mode3D ? Color.blue : Color.clear)
                            .cornerRadius(4)
                            .onTapGesture { mode3D = true }
                        Text("2D")
                            .fontWeight(!mode3D ? .bold : .regular)
                            .padding(.horizontal, 12).padding(.vertical, 4)
                            .background(!mode3D ? Color.blue : Color.clear)
                            .cornerRadius(4)
                            .onTapGesture { mode3D = false }
                    }
                }
                .padding(.horizontal)
                .frame(height: 40)
                .background(Color(red: 0.15, green: 0.15, blue: 0.15))
                .foregroundColor(.white)
            }
        }
        EOF

    # -----------------------------------------------------------------------
    # 12. Minimal Godot project (so the engine has something to load)
    # -----------------------------------------------------------------------
    - name: Create Bundled Godot Project
      run: |
        mkdir -p XogotApp/Resources/godot_project
        cat << 'EOF' > XogotApp/Resources/godot_project/project.godot
        ; Engine configuration file.
        ; It's best edited using the editor UI, but can be edited directly.

        [application]
        config/name="Xogot Demo"
        config/description="Minimal project for Xogot Editor"
        run/main_scene="res://scene.tscn"
        config/features=PackedStringArray("4.2")
        EOF

        # A very basic 3D scene with a camera, light, and cube
        cat << 'EOF' > XogotApp/Resources/godot_project/scene.tscn
        [gd_scene load_steps=6 format=3 uid="uid://d3j6b8m5j7x2n"]

        [ext_resource type="PackedScene" uid="uid://bg1e3r5fj8t0y" path="res://cube_mesh.tres" id="1_cube"]

        [sub_resource type="StandardMaterial3D" id="StandardMaterial3D_1"]
        albedo_color = Color(0.2, 0.6, 1.0, 1.0)

        [sub_resource type="BoxMesh" id="BoxMesh_1"]
        material = SubResource("StandardMaterial3D_1")

        [node name="Node3D" type="Node3D"]

        [node name="Camera3D" type="Camera3D" parent="."]
        transform = Transform3D(1, 0, 0, 0, 1, 0, 0, 0, 1, 0, 2, 5)

        [node name="DirectionalLight3D" type="DirectionalLight3D" parent="."]
        transform = Transform3D(0.866025, -0.353553, 0.353553, 0, 0.707107, 0.707107, -0.5, -0.612372, 0.612372, 0, 0, 0)

        [node name="MeshInstance3D" type="MeshInstance3D" parent="."]
        mesh = SubResource("BoxMesh_1")
        EOF

        # Since the scene references a cube_mesh.tres, we provide a placeholder (the scene already defines the mesh inline, so this file can be empty or just a dummy)
        cat << 'EOF' > XogotApp/Resources/godot_project/cube_mesh.tres
        [gd_resource type="ArrayMesh" load_steps=0 format=3]
        EOF

    # -----------------------------------------------------------------------
    # 13. XcodeGen project definition
    # -----------------------------------------------------------------------
    - name: Create project.yml
      run: |
        cat << 'EOF' > project.yml
        name: XogotApp
        options:
          bundleIdPrefix: com.xogot
        targets:
          XogotApp:
            type: application
            platform: iOS
            deploymentTarget: "16.0"
            sources:
              - path: XogotApp/Sources
              - path: XogotApp/Core
              - path: XogotApp/Bridge
            resources:
              - path: XogotApp/Resources
            settings:
              INFOPLIST_FILE: XogotApp/Info.plist
              SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/XogotApp/Bridge/BridgingHeader.h
              CLANG_CXX_LANGUAGE_STANDARD: "c++17"
              GCC_PREPROCESSOR_DEFINITIONS:
                - "GODOT_IPHONE=1"
                - "VULKAN_ENABLED=0"
                - "GLES_ENABLED=1"
              LIBRARY_SEARCH_PATHS:
                - $(PROJECT_DIR)/XogotApp/Libs
              OTHER_LDFLAGS:
                - -ObjC
                - -lstdc++
                - -force_load $(PROJECT_DIR)/XogotApp/Libs/libgodot_engine.a
              HEADER_SEARCH_PATHS:
                - $(PROJECT_DIR)/godot_src
                - $(PROJECT_DIR)/godot_src/platform/ios
                - $(PROJECT_DIR)/godot_src/drivers/gles3
              FRAMEWORK_SEARCH_PATHS:
                - $(inherited)
            dependencies:
              - sdk: UIKit.framework
              - sdk: Metal.framework
              - sdk: QuartzCore.framework
              - sdk: OpenGLES.framework
              - sdk: CoreMotion.framework
              - sdk: CoreMedia.framework
              - sdk: AVFoundation.framework
              - sdk: CoreGraphics.framework
              - sdk: CoreText.framework
              - sdk: ImageIO.framework
              - sdk: GameController.framework
              - sdk: libc++.tbd
              - sdk: libz.tbd
        EOF

    - name: Generate Xcode Project
      run: xcodegen generate

    # -----------------------------------------------------------------------
    # 14. Build the app
    # -----------------------------------------------------------------------
    - name: Build App for iOS
      run: |
        xcodebuild build \
          -project XogotApp.xcodeproj \
          -scheme XogotApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          BUILD_DIR="$(PWD)/build"

    # -----------------------------------------------------------------------
    # 15. Package IPA with pseudo-sign (ldid) – for jailbroken devices only!
    #     Replace this section with proper signing if you have a developer account.
    # -----------------------------------------------------------------------
    - name: Package and Pseudo-Sign IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/XogotApp.app Payload/
        ldid -S Payload/XogotApp.app/XogotApp
        zip -r XogotApp.ipa Payload/

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Xogot-iOS-Editor-IPA
        path: XogotApp.ipa
