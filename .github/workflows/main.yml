- name: Generate SwiftUI Code
      run: |
        cat << 'EOF' > XogotApp/Sources/XogotApp.swift
        import SwiftUI

        @main
        struct XogotApp: App {
            init() {
                print("Engine Initialized: \(GodotWrapper.getEngineVersion() ?? "Unknown")")
            }
            var body: some Scene {
                WindowGroup {
                    MainEditorView()
                        .preferredColorScheme(.dark) // Force dark game‑editor style
                }
            }
        }

        // MARK: - Main Editor Layout
        struct MainEditorView: View {
            var body: some View {
                VStack(spacing: 0) {
                    TopToolbar()
                    Divider().background(Color.white.opacity(0.1))
                    
                    HStack(spacing: 0) {
                        SceneTreeView()
                            .frame(width: 250)
                        Divider().background(Color.white.opacity(0.1))
                        
                        ViewportArea()
                            .frame(maxWidth: .infinity, maxHeight: .infinity)
                        
                        Divider().background(Color.white.opacity(0.1))
                        InspectorView()
                            .frame(width: 300)
                    }
                    
                    Divider().background(Color.white.opacity(0.1))
                    BottomControls()
                }
                .background(Color(red: 0.1, green: 0.1, blue: 0.1)) // Dark background
            }
        }

        // MARK: - Top Toolbar (Game editor style)
        struct TopToolbar: View {
            var body: some View {
                HStack(spacing: 16) {
                    // Tool icons
                    Image(systemName: "cursorarrow")
                    Image(systemName: "move.3d")
                    Image(systemName: "rotate.3d")
                    Image(systemName: "scale.3d")
                    Divider().frame(height: 24)
                    Image(systemName: "square.on.square") // Snap
                    
                    Spacer()
                    
                    // Play / Stop
                    Button(action: {}) {
                        Image(systemName: "play.fill")
                            .foregroundColor(.green)
                            .font(.title3)
                    }
                    Button(action: {}) {
                        Image(systemName: "stop.fill")
                            .foregroundColor(.red)
                            .font(.title3)
                    }
                }
                .padding(.horizontal, 12)
                .frame(height: 48)
                .background(Color(red: 0.15, green: 0.15, blue: 0.15))
                .foregroundColor(.white)
            }
        }

        // MARK: - Scene Tree (Left panel)
        struct SceneTreeView: View {
            var body: some View {
                VStack(alignment: .leading, spacing: 0) {
                    Text("Scene")
                        .font(.caption)
                        .foregroundColor(.gray)
                        .padding(.horizontal, 12)
                        .padding(.top, 8)
                    List {
                        Text("Node3D").font(.callout)
                        Text("  ↳ Camera3D").foregroundColor(.blue)
                        Text("  ↳ DirectionalLight3D").foregroundColor(.yellow)
                        Text("  ↳ CharacterBody3D").foregroundColor(.orange)
                    }
                    .listStyle(.plain)
                    .background(Color(red: 0.12, green: 0.12, blue: 0.12))
                    .foregroundColor(.white)
                }
                .background(Color(red: 0.12, green: 0.12, blue: 0.12))
            }
        }

        // MARK: - 3D Viewport with Grid
        struct ViewportArea: View {
            var body: some View {
                ZStack(alignment: .topLeading) {
                    // Simulated 3D grid (simple version)
                    Canvas { context, size in
                        let gridSize: CGFloat = 20
                        let stepX = size.width / gridSize
                        let stepY = size.height / gridSize
                        var path = Path()
                        for i in 0...Int(gridSize) {
                            let x = CGFloat(i) * stepX
                            path.move(to: CGPoint(x: x, y: 0))
                            path.addLine(to: CGPoint(x: x, y: size.height))
                        }
                        for i in 0...Int(gridSize) {
                            let y = CGFloat(i) * stepY
                            path.move(to: CGPoint(x: 0, y: y))
                            path.addLine(to: CGPoint(x: size.width, y: y))
                        }
                        context.stroke(path, with: .color(.gray.opacity(0.2)), lineWidth: 0.5)
                    }
                    
                    // Center message
                    Text("Godot 3D Viewport")
                        .foregroundColor(.white.opacity(0.4))
                        .frame(maxWidth: .infinity, maxHeight: .infinity)
                    
                    // Perspective pill
                    PerspectiveSelector()
                }
                .background(Color.black)
            }
        }

        struct PerspectiveSelector: View {
            var body: some View {
                HStack(spacing: 4) {
                    Text("Perspective").font(.caption)
                    Image(systemName: "house.fill").font(.caption)
                }
                .padding(.horizontal, 10)
                .padding(.vertical, 6)
                .background(Color.black.opacity(0.7))
                .cornerRadius(12)
                .foregroundColor(.white)
                .padding()
            }
        }

        // MARK: - Inspector (Right panel)
        struct InspectorView: View {
            @State private var posX: Float = 0.0
            @State private var posY: Float = 0.0
            @State private var posZ: Float = 0.0
            @State private var rotX: Float = 0.0
            @State private var scale: Float = 1.0
            
            var body: some View {
                ScrollView {
                    VStack(alignment: .leading, spacing: 16) {
                        Text("Inspector")
                            .font(.headline)
                            .padding(.top, 8)
                            .padding(.horizontal)
                        
                        GroupBox(label: Text("Transform").font(.subheadline)) {
                            VStack(spacing: 12) {
                                PropertyRow(label: "Position X", value: $posX, range: -10...10) {
                                    GodotWrapper.updateNodeTransformX(posX, y: posY, z: posZ)
                                }
                                PropertyRow(label: "Position Y", value: $posY, range: -10...10) {
                                    GodotWrapper.updateNodeTransformX(posX, y: posY, z: posZ)
                                }
                                PropertyRow(label: "Position Z", value: $posZ, range: -10...10) {
                                    GodotWrapper.updateNodeTransformX(posX, y: posY, z: posZ)
                                }
                                PropertyRow(label: "Rotation X", value: $rotX, range: -180...180)
                                PropertyRow(label: "Scale", value: $scale, range: 0.1...10)
                            }
                            .padding(.vertical, 8)
                        }
                        .padding(.horizontal)
                    }
                }
                .background(Color(red: 0.13, green: 0.13, blue: 0.13))
                .foregroundColor(.white)
            }
        }

        // Reusable property row with slider
        struct PropertyRow: View {
            let label: String
            @Binding var value: Float
            let range: ClosedRange<Float>
            var onChange: (() -> Void)? = nil
            
            var body: some View {
                VStack(alignment: .leading, spacing: 4) {
                    HStack {
                        Text(label)
                            .font(.caption)
                            .foregroundColor(.gray)
                        Spacer()
                        TextField("", value: $value, formatter: NumberFormatter())
                            .frame(width: 60)
                            .multilineTextAlignment(.trailing)
                            .textFieldStyle(.plain)
                            .foregroundColor(.white)
                            .font(.caption)
                    }
                    Slider(value: $value, in: range)
                        .onChange(of: value) { _ in
                            onChange?()
                        }
                        .tint(.blue)
                }
            }
        }

        // MARK: - Bottom Controls
        struct BottomControls: View {
            @State private var mode3D = true
            
            var body: some View {
                HStack {
                    Button(action: {}) {
                        Image(systemName: "arrow.counterclockwise")
                    }
                    Spacer()
                    HStack(spacing: 0) {
                        Text("3D")
                            .fontWeight(mode3D ? .bold : .regular)
                            .padding(.horizontal, 12)
                            .padding(.vertical, 4)
                            .background(mode3D ? Color.blue : Color.clear)
                            .cornerRadius(4)
                            .onTapGesture { mode3D = true }
                        Text("2D")
                            .fontWeight(!mode3D ? .bold : .regular)
                            .padding(.horizontal, 12)
                            .padding(.vertical, 4)
                            .background(!mode3D ? Color.blue : Color.clear)
                            .cornerRadius(4)
                            .onTapGesture { mode3D = false }
                    }
                }
                .padding(.horizontal)
                .frame(height: 40)
                .background(Color(red: 0.15, green: 0.15, blue: 0.15))
                .foregroundColor(.white)
            }
        }
        EOF
